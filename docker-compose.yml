version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mindscope-postgres
    environment:
      POSTGRES_USER: mindscope
      POSTGRES_PASSWORD: mindscope
      POSTGRES_DB: mindscope
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: mindscope-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    # Note: In production, pre-pull the model. For dev, it will pull on first request.
    # To pre-pull: docker exec mindscope-ollama ollama pull google/gemma-4-E4B-it

  # Placeholder services for workers — uncomment and configure as needed
  # tribe-worker:
  #   build:
  #     context: workers/tribe
  #     dockerfile: Dockerfile
  #   container_name: mindscope-tribe-worker
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     DATABASE_URL: postgresql://mindscope:mindscope@postgres:5432/mindscope
  #     OLLAMA_BASE_URL: http://ollama:11434
  #   volumes:
  #     - ./models/tribev2:/models/tribev2

volumes:
  postgres_data:
  redis_data:
  ollama_data:
